# Application
spring.application.name=real-estate-backend
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/real_estate_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernatepm
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=ThisIsAVerySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong1234567890
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=./uploads

# CORS
app.cors.allowed-origins=http://localhost:5173

# Frontend URL (used in email links)
app.frontend.url=http://localhost:5173

# Mail (Gmail SMTP — replace with your credentials)
